# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
title: Aakash Tyagi
first_name: Aakash
middle_name:
last_name: Tyagi
email: tyagi@cse.tamu.edu
description: Zachry Teaching Professor, Texas A&M University CSE. Hardware verification, secure computing, ML for CAD, and agentic AI energy measurement.
footer_text: >
  Texas A&M University · Department of Computer Science & Engineering
keywords: hardware verification, secure computing, ML for CAD, agentic AI, EpG, Texas A&M, Aakash Tyagi

lang: en
icon: ⚡️

url: https://aakashtyagi.github.io
baseurl:
last_updated: true
impressum_path:

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
feed_limit: 10

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
bib_search: true

# -----------------------------------------------------------------------------
# Open Graph & Schema
# -----------------------------------------------------------------------------
serve_og_meta: true
serve_schema_org: true
og_image: /assets/img/prof_tyagi.jpg

# -----------------------------------------------------------------------------
# Social links (shown in sidebar)
# -----------------------------------------------------------------------------
contact_note:
github_username: aakashtyagi
linkedin_username:
scholar_userid: mATRn2cAAAAJ
orcid_id:
research_gate_profile: Aakash-Tyagi-4

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name:
blog_nav_title:
blog_description:
permalink: /blog/:year/:title/

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_limit: 10
latest_posts:
  enabled: false

# -----------------------------------------------------------------------------
# jekyll-scholar
# -----------------------------------------------------------------------------
scholar:
  last_name: [Tyagi]
  first_name: [Aakash, A.]
  style: apa
  locale: en
  sort_by: year,month
  order: descending
  group_by: year
  group_order: descending
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters:
    - superscript
    - tex
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"

# Badges
enable_publication_badges: true
enable_arxiv_badges: false
enable_publication_thumbnails: false

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-scholar
  - jekyll-get-json
  - jekyll-link-attributes
  - jekyll-toc

# -----------------------------------------------------------------------------
# Markdown
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
